<!-- Insert custom site style overrides -->
<script>
  // Immediately set theme based on localStorage to prevent styling flash
  (function() {
    var storedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.classList.add('theme-' + storedTheme);
  })();
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

  /* Theme variables definition */
  html.theme-dark {
    --bg-color: #2b2b2b; /* IntelliJ Darcula Editor Background */
    --card-bg: #313335; /* IntelliJ Tool Window / Inner Background */
    --text-color: #a9b7c6; /* IntelliJ Darcula Text */
    --text-title: #ffffff; /* IntelliJ active/white text */
    --text-muted: #808080; /* IntelliJ grey comments */
    --border-color: #4c5052; /* IntelliJ grid/border grey */
    --accent-color: #589df6; /* IntelliJ accent blue */
    --accent-hover: #72a7f8;
    --sidebar-bg: #3c3f41; /* IntelliJ tool window background */
    --badge-bg: rgba(88, 157, 246, 0.12);
    --badge-color: #589df6;
    --code-bg: #232323; /* IntelliJ darker code editor bg */
    --code-inline-bg: #3c3f41;
    --code-color: #a9b7c6;
  }

  html.theme-light {
    --bg-color: #f2f2f2; /* IntelliJ Light background (off-white) */
    --card-bg: #ffffff; /* White card layout */
    --text-color: #1f1f1f; /* Near black text */
    --text-title: #000000; /* Black headings */
    --text-muted: #6e6e6e; /* Grey comments */
    --border-color: #d1d1d1; /* Light grey grid borders */
    --accent-color: #2f65ca; /* IntelliJ light blue accent */
    --accent-hover: #1e3f84;
    --sidebar-bg: #f5f5f5; /* Light grey sidebar panels */
    --badge-bg: rgba(47, 101, 202, 0.08);
    --badge-color: #2f65ca;
    --code-bg: #ffffff;
    --code-inline-bg: #e9ecef;
    --code-color: #1f1f1f;
  }

  /* Base Site Redesign */
  html, body {
    background-color: var(--bg-color) !important;
    color: var(--text-color) !important;
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Reset all main layouts and sections to use theme variables */
  #main, .initial-content, .page__footer, .page, .archive, .page__content {
    background-color: var(--bg-color) !important;
    color: var(--text-color) !important;
  }

  /* Theme color transition rules */
  body, #main, .sidebar, .list__item, summary, .category-count, .archive__subtitle, .page__footer, div.highlighter-rouge, pre.highlight, code {
    transition: background-color 0.25s ease, color 0.2s ease, border-color 0.25s ease, transform 0.2s ease !important;
  }

  /* General Links */
  a {
    text-decoration: none !important;
    color: var(--accent-color) !important;
    transition: color 0.15s ease !important;
  }
  a:hover {
    color: var(--accent-hover) !important;
  }

  /* Layout Spacing */
  #main {
    padding-top: 2.5em !important;
    max-width: 1280px !important;
  }

  /* Sidebar clean flat overrides */
  .sidebar {
    overflow-y: visible !important;
    overflow: visible !important;
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    padding: 0 !important;
    box-shadow: none !important;
    margin-bottom: 2em !important;
  }

  /* Category details styling */
  details.category-details {
    margin-bottom: 0.6em !important;
    padding: 0;
    border: none !important;
  }

  details.category-details summary {
    font-weight: 600 !important;
    font-size: 0.9em !important;
    color: var(--text-color) !important;
    outline: none !important;
    display: flex !important;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px !important;
    border-radius: 8px !important;
    cursor: pointer !important;
    list-style: none !important;
    list-style-type: none !important;
  }

  /* Completely hide standard triangles in all browsers */
  details.category-details summary::-webkit-details-marker {
    display: none !important;
  }
  details.category-details summary::marker {
    display: none !important;
  }

  details.category-details summary:hover {
    background-color: rgba(128, 128, 128, 0.08) !important;
    color: var(--text-title) !important;
  }

  /* Custom Arrow Indicator */
  details.category-details summary::before {
    content: "›" !important;
    margin-right: 0.6em !important;
    color: var(--text-muted) !important;
    display: inline-block !important;
    transition: transform 0.2s ease, color 0.2s ease !important;
    font-size: 1.25em !important;
    line-height: 1 !important;
  }

  details.category-details[open] summary::before {
    transform: rotate(90deg) !important;
    color: var(--accent-color) !important;
  }

  /* Category post list styling */
  details.category-details ul.category-posts {
    list-style: none !important;
    padding-left: 1.25em !important;
    margin: 0.4em 0 0.6em 0.8em !important;
    border-left: 1.5px solid var(--border-color) !important;
  }

  details.category-details ul.category-posts li {
    margin-bottom: 0.4em !important;
    list-style: none !important;
    padding: 0 !important;
  }

  details.category-details ul.category-posts li a {
    font-size: 0.82em !important;
    color: var(--text-color) !important;
    text-decoration: none !important;
    display: block !important;
    padding: 2px 0 !important;
    transition: color 0.2s ease, transform 0.2s ease !important;
  }

  details.category-details ul.category-posts li a:hover {
    color: var(--accent-color) !important;
    transform: translateX(4px) !important;
  }

  /* Count badge */
  .category-count {
    font-size: 0.75em !important;
    background-color: var(--badge-bg) !important;
    border: 1px solid var(--border-color) !important;
    padding: 1px 7px !important;
    border-radius: 9999px !important;
    color: var(--badge-color) !important;
    font-weight: 600 !important;
  }

  /* Recent Posts Title */
  .archive__subtitle {
    font-size: 0.85rem !important;
    font-weight: 700 !important;
    color: var(--accent-color) !important;
    border-bottom: none !important;
    border-left: 3px solid var(--accent-color) !important;
    padding-left: 10px !important;
    padding-bottom: 0 !important;
    margin-top: 0 !important;
    margin-bottom: 1.5rem !important;
    text-transform: uppercase !important;
    letter-spacing: 0.1em !important;
    display: block !important;
  }

  /* Post Layout - Premium Card Grid */
  .list__item {
    margin-bottom: 1.25rem !important;
    border-bottom: none !important;
    padding-bottom: 0 !important;
    background: var(--card-bg) !important;
    border: 1px solid var(--border-color) !important;
    border-radius: 12px !important;
    padding: 20px !important;
  }

  .list__item:hover {
    transform: translateY(-2px) !important;
    border-color: var(--accent-color) !important;
  }

  .archive__item-title {
    font-size: 1.25em !important;
    margin-top: 0 !important;
    margin-bottom: 0.4em !important;
    font-weight: 600 !important;
    letter-spacing: -0.2px !important;
  }

  .archive__item-title a {
    color: var(--text-title) !important;
  }

  .archive__item-title a:hover {
    color: var(--accent-color) !important;
  }

  .archive__item-excerpt {
    font-size: 0.88em !important;
    color: var(--text-color) !important;
    margin-top: 0.4em !important;
    margin-bottom: 0 !important;
    line-height: 1.6 !important;
    opacity: 0.85;
  }

  /* Single Post Page Details */
  .page__title {
    font-size: 2.2em !important;
    color: var(--text-title) !important;
    font-weight: 700 !important;
    letter-spacing: -0.5px !important;
    margin-top: 0.5em !important;
    margin-bottom: 0.5em !important;
  }

  .page__content {
    font-size: 1rem !important;
    line-height: 1.75 !important;
    color: var(--text-color) !important;
  }

  .page__content h1, .page__content h2, .page__content h3, .page__content h4 {
    color: var(--text-title) !important;
    font-weight: 600 !important;
  }

  .page__content a {
    color: var(--accent-color) !important;
    border-bottom: 1px dotted var(--accent-color) !important;
    transition: color 0.15s ease, border-color 0.15s ease !important;
  }

  .page__content a:hover {
    color: var(--accent-hover) !important;
    border-bottom-style: solid !important;
    border-bottom-color: var(--accent-hover) !important;
  }

  /* Code Highlighter Redesign */
  div.highlighter-rouge, figure.highlight, pre.highlight {
    background-color: var(--code-bg) !important;
    border: 1px solid var(--border-color) !important;
    border-radius: 8px !important;
    padding: 14px 18px !important;
    overflow-x: auto !important;
    margin-top: 1.5em !important;
    margin-bottom: 1.5em !important;
  }

  code {
    background-color: var(--code-inline-bg) !important;
    padding: 2px 6px !important;
    border-radius: 4px !important;
    font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, Courier, monospace !important;
    font-size: 0.85em !important;
    color: var(--code-color) !important;
  }

  div.highlighter-rouge code {
    background-color: transparent !important;
    padding: 0 !important;
    border-radius: 0 !important;
  }

  /* Compact Footer Overrides */
  .page__footer {
    padding-top: 2.5rem !important;
    padding-bottom: 2.5rem !important;
    margin-top: 5rem !important;
    border-top: 1px solid var(--border-color) !important;
  }

  .page__footer-follow, .page__footer-copyright {
    font-size: 0.78em !important;
    color: var(--text-muted) !important;
  }

  .page__footer-follow a, .page__footer-copyright a {
    color: var(--text-color) !important;
  }

  .page__footer-follow a:hover, .page__footer-copyright a:hover {
    color: var(--accent-color) !important;
  }

  /* Theme Toggle Button Styling */
  .theme-toggle-btn {
    position: fixed !important;
    top: 24px !important;
    right: 24px !important;
    z-index: 10000 !important;
    width: 44px !important;
    height: 44px !important;
    border-radius: 50% !important;
    border: 1px solid var(--border-color) !important;
    background-color: var(--card-bg) !important;
    color: var(--text-title) !important;
    cursor: pointer !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
    transition: background-color 0.25s, color 0.2s, transform 0.2s, border-color 0.25s !important;
    outline: none !important;
  }

  .theme-toggle-btn:hover {
    transform: scale(1.08) !important;
    border-color: var(--accent-color) !important;
  }

  .theme-toggle-btn i {
    font-size: 1.15em !important;
  }
</style>

<script>
  // DOM injection script for dynamic theme switcher
  document.addEventListener('DOMContentLoaded', function() {
    if (document.getElementById('theme-toggle')) return;

    var btn = document.createElement('button');
    btn.id = 'theme-toggle';
    btn.className = 'theme-toggle-btn';
    btn.setAttribute('aria-label', 'Toggle theme');

    var isLight = document.documentElement.classList.contains('theme-light');
    btn.innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';

    document.body.appendChild(btn);

    btn.addEventListener('click', function() {
      var isCurrentlyLight = document.documentElement.classList.contains('theme-light');
      if (isCurrentlyLight) {
        document.documentElement.classList.remove('theme-light');
        document.documentElement.classList.add('theme-dark');
        localStorage.setItem('theme', 'dark');
        btn.innerHTML = '<i class="fas fa-sun"></i>';
      } else {
        document.documentElement.classList.remove('theme-dark');
        document.documentElement.classList.add('theme-light');
        localStorage.setItem('theme', 'light');
        btn.innerHTML = '<i class="fas fa-moon"></i>';
      }
    });
  });
</script>
